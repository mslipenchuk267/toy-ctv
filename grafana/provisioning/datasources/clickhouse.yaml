apiVersion: 1
datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    isDefault: true
    access: proxy
    jsonData:
      # Connect via HTTP (matches your CH 8123 mapping)
      protocol: http
      host: clickhouse         # <--- service name inside Compose network
      port: 8123
      defaultDatabase: ctv
      username: default
      tlsSkipVerify: true
    secureJsonData:
      password: mysecret       # <--- set to your ClickHouse password
